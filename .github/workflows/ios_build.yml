name: iOS Build
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Web Build
        run: |
          mkdir -p dist
          # Копируем всё из корня в dist, чтобы Capacitor не ругался
          cp index.html dist/ || true
          cp -r *.js dist/ || true
          cp -r *.css dist/ || true

      - name: Capacitor Sync
        run: npx cap sync ios

      - name: Build For Simulator
        run: |
          cd ios/App
          xcodebuild -scheme App -destination 'generic/platform=iOS Simulator' -derivedDataPath build
          # Эта команда не требует сертификатов и "Team ID"

      - name: Export Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: ios/App/build/Build/Products/Debug-iphonesimulator/App.app